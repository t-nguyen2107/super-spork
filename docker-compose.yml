version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_local_pw
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data

volumes:
  crm_pgdata: